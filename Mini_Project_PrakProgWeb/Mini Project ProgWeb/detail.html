<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Kampanye — Aksi Nurani</title>
  <link rel="icon" href="asset/logo aksi nurani.png">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/detail.css">
</head>
<body>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo">
    <img src="asset/logo aksi nurani.png" alt="Logo">
    <div class="logo-text">
      <span class="logo-name">Aksi Nurani</span>
      <span class="logo-tagline">Bergerak, Berbagi, Berdampak</span>
    </div>
  </a>
  <nav class="header-nav">
    <a href="index.html" class="nav-link">Beranda</a>
    <div id="nav-auth"></div>
  </nav>
</header>

<div class="container" id="main-container">
  <!-- Campaign contents will be injected by JS -->
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/data.js"></script>
<script>
  updateNavAuth();

  const hash = window.location.hash.replace('#', '') || 'cianjur';
  const campaign = getCampaignById(hash);

  if (!campaign) {
    document.getElementById('main-container').innerHTML = '<p style="text-align:center;padding:80px;color:var(--text-muted)">Kampanye tidak ditemukan. <a href="index.html">Kembali ke beranda</a></p>';
  } else {
    renderDetail(campaign);
  }

  function renderDetail(c) {
    const extraDonations = DonationDB.getAll().filter(d => d.campaignId === c.id);
    const extraAmount = extraDonations.reduce((s, d) => s + Number(d.nominal), 0);
    const totalCollected = c.collected + extraAmount;
    const pct = getProgress(totalCollected, c.target);
    const totalDonors = c.donorCount + extraDonations.length;
    const session = Auth.getSession();

    const loginBanner = !session ? `
      <div class="login-required-banner">
        <div class="lrb-icon">🔐</div>
        <div class="lrb-text">
          Anda harus <a href="login.html?redirect=detail.html%23${c.id}">login terlebih dahulu</a> untuk berdonasi.
        </div>
      </div>
    ` : '';

    const donateBtn = session
      ? `<a href="donasi.html#${c.id}" class="btn-donate-now">❤️ Donasi Sekarang</a>`
      : `<a href="login.html?redirect=detail.html%23${c.id}" class="btn-donate-now">🔐 Login untuk Donasi</a>`;

    const recentDonors = extraDonations.slice().reverse().slice(0, 5);
    const donorHTML = recentDonors.length === 0 ? `<p class="no-donors">Belum ada donasi. Jadilah yang pertama! 💪</p>` :
      recentDonors.map(d => `
        <div class="donor-item">
          <div class="donor-avatar">${d.name.charAt(0).toUpperCase()}</div>
          <div class="donor-info">
            <div class="donor-name">${d.name}</div>
            <div class="donor-time">${new Date(d.createdAt).toLocaleString('id-ID')}</div>
            ${d.message ? `<div style="font-size:12px;color:#64748b;font-style:italic;">"${d.message}"</div>` : ''}
          </div>
          <div class="donor-amount">${formatRupiah(d.nominal)}</div>
        </div>
      `).join('');

    document.getElementById('main-container').innerHTML = `
      <div class="campaign-content show">
        <div class="breadcrumb">
          <a href="index.html">🏠 Beranda</a>
          <span>›</span>
          <span class="badge badge-${c.categoryClass}">${c.category}</span>
          <span>›</span>
          <span>${c.title}</span>
        </div>

        <div class="detail-grid">
          <div class="detail-img-wrap">
            <img src="${c.image}" alt="${c.title}">
            <p class="img-caption">📍 ${c.location}</p>

            <div style="margin-top:20px;">
              <div class="donor-section">
                <h3>💬 Donasi Terbaru</h3>
                <div class="donor-list">${donorHTML}</div>
              </div>
            </div>
          </div>

          <div class="detail-right">
            <h2>${c.title}</h2>

            <div class="meta-chips">
              <div class="meta-chip">🏛 <strong>${c.organizer}</strong></div>
              <div class="meta-chip">📍 <strong>${c.location}</strong></div>
              <div class="meta-chip"><span class="badge badge-${c.categoryClass}">${c.category}</span></div>
            </div>

            <!-- PROGRESS -->
            <div class="progress-card">
              <div class="progress-header">
                <div>
                  <div class="amount-collected" id="amount-collected">${formatRupiah(totalCollected)}</div>
                  <div class="amount-target">dari target ${formatRupiah(c.target)}</div>
                </div>
                <div class="progress-pct" id="pct-label">${pct}%</div>
              </div>
              <div class="progress-bar-lg">
                <div class="progress-fill-lg" id="progress-fill" style="width: 0%"></div>
              </div>
              <div class="progress-meta">
                <span class="donors">👥 ${totalDonors} donatur</span>
                <span class="deadline">⏰ ${c.deadlineText}</span>
              </div>
            </div>

            <!-- ABOUT -->
            <div class="about-section">
              <h3>Tentang Kampanye</h3>
              <p>${c.description}</p>
              <p>${c.description2}</p>
            </div>

            <!-- PAYMENT -->
            <div class="payment-box">
              <h4>🏦 Metode Donasi / Rekening</h4>
              <div class="payment-item">
                <div class="payment-icon">🏦</div>
                <div><div class="p-name">Bank BCA</div><div class="p-num">1234-5678-90 a.n Aksi Nurani</div></div>
              </div>
              <div class="payment-item">
                <div class="payment-icon">🏦</div>
                <div><div class="p-name">Bank Mandiri</div><div class="p-num">0987-6543-21 a.n Aksi Nurani</div></div>
              </div>
              <div class="payment-item">
                <div class="payment-icon">💳</div>
                <div><div class="p-name">E-Wallet GoPay / DANA</div><div class="p-num">0812-3456-7890</div></div>
              </div>
            </div>

            ${loginBanner}

            <div class="btn-group">
              <a href="index.html" class="btn-back-detail">← Kembali</a>
              ${donateBtn}
            </div>
          </div>
        </div>
      </div>
    `;

    // Animate progress
    setTimeout(() => {
      document.getElementById('progress-fill').style.width = pct + '%';
    }, 200);
  }
</script>
</body>
</html>
